name: PR

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# `pull_request_target` so the label job can write to PRs from forks.
# Safe here because neither job checks out PR code — they only read
# `pull_request.title`.
on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: write
  issues: write  # required for `gh label create` (labels are an issues-scope resource)

jobs:
  # ── Title validation (conventional-commits format) ──────────────────
  lint-title:
    name: Title
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        run: |
          PR_TITLE=$(jq -r '.pull_request.title' "$GITHUB_EVENT_PATH")
          echo "PR title: $PR_TITLE"

          if [[ ! "$PR_TITLE" =~ ^(release|feat|fix|chore|docs|refactor|test|style|ci|perf|data)(\(.*?\))?:\ .* ]]; then
            echo "❌ Invalid PR title: '$PR_TITLE'"
            echo "Expected format: 'type: description' or 'type(scope): description'"
            echo "Allowed types: release, feat, fix, chore, docs, refactor, test, style, ci, perf, data."
            exit 1
          fi

          echo "✅ PR title is valid"

  # ── Apply release-notes label from title prefix ─────────────────────
  # Title-prefix → label mapping:
  #   feat: / feature:           → feature
  #   fix: / bugfix:             → bug
  #   perf:                      → performance
  #   docs: / doc:               → documentation
  #   test: / tests:             → test
  #   chore: / ci: / build: /
  #   refactor: / style:         → ignore-for-release
  #   `!` suffix or "BREAKING
  #   CHANGE" in body            → breaking
  apply-label:
    name: Label
    runs-on: ubuntu-latest
    steps:
      - name: Apply Label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          label=""; color=""; desc=""
          if   [[ "$PR_TITLE" == *"BREAKING CHANGE"* ]]                                  ; then label="breaking";          color="d73a4a"; desc="Breaking change"
          elif [[ "$PR_TITLE" =~ ^[a-z]+(\(.+\))?\!: ]]                                  ; then label="breaking";          color="d73a4a"; desc="Breaking change"
          elif [[ "$PR_TITLE" =~ ^(feat|feature)(\(.+\))?: ]]                            ; then label="feature";           color="0e8a16"; desc="New feature"
          elif [[ "$PR_TITLE" =~ ^(fix|bugfix)(\(.+\))?: ]]                              ; then label="bug";               color="d73a4a"; desc="Bug fix"
          elif [[ "$PR_TITLE" =~ ^perf(\(.+\))?: ]]                                      ; then label="performance";       color="1d76db"; desc="Performance improvement"
          elif [[ "$PR_TITLE" =~ ^docs?(\(.+\))?: ]]                                     ; then label="documentation";     color="0075ca"; desc="Documentation"
          elif [[ "$PR_TITLE" =~ ^tests?(\(.+\))?: ]]                                    ; then label="test";              color="fbca04"; desc="Tests"
          elif [[ "$PR_TITLE" =~ ^(chore|ci|build|refactor|style)(\(.+\))?: ]]           ; then label="ignore-for-release"; color="cccccc"; desc="Hidden from release notes"
          fi
          if [ -n "$label" ]; then
            echo "Applying label: $label"
            gh label create "$label" --color "$color" --description "$desc" --repo "${{ github.repository }}" 2>/dev/null || true
            gh pr edit "$PR_NUM" --add-label "$label" --repo "${{ github.repository }}"
          else
            echo "No matching prefix in '$PR_TITLE'; leaving unlabeled (will fall to 'Other Changes')."
          fi
