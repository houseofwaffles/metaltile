# Minimal LOC rustfmt config (nightly)
unstable_features = true
use_small_heuristics = "Max"

# Collapse where possible (nightly)
fn_single_line = true
where_single_line = true
empty_item_single_line = true
struct_lit_single_line = true
force_multiline_blocks = false

# Tighter imports (nightly)
imports_layout = "HorizontalVertical"
imports_granularity = "Crate"
group_imports = "StdExternalCrate"
reorder_imports = true

# Trim blank lines (nightly)
blank_lines_upper_bound = 1
blank_lines_lower_bound = 0
newline_style = "Unix"

# Compact match arms
match_arm_blocks = false  # nightly
match_block_trailing_comma = true
match_arm_leading_pipes = "Never"

# Misc compaction
overflow_delimited_expr = true       # nightly
condense_wildcard_suffixes = true    # nightly
use_field_init_shorthand = true
use_try_shorthand = true
remove_nested_parens = true
normalize_comments = true            # nightly
wrap_comments = false                # nightly
format_strings = false               # nightly
hard_tabs = false
tab_spaces = 4
