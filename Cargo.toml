[workspace]
resolver = "2"
members = [
  "crates/metaltile-core",
  "crates/metaltile-macros",
  "crates/metaltile-codegen",
  "crates/metaltile-interp",
  "crates/metaltile-runtime",
  "crates/metaltile",
  "crates/metaltile-bench",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
repository = "https://github.com/metaltile/metaltile"
homepage = "https://github.com/metaltile/metaltile"
documentation = "https://docs.rs/metaltile"

[workspace.dependencies]
# Internal
metaltile = { path = "crates/metaltile" }
metaltile-core = { path = "crates/metaltile-core" }
metaltile-macros = { path = "crates/metaltile-macros" }
metaltile-codegen = { path = "crates/metaltile-codegen" }
metaltile-interp = { path = "crates/metaltile-interp" }
metaltile-runtime = { path = "crates/metaltile-runtime" }

# External
syn = { version = "2", features = ["full", "extra-traits"] }
quote = "1"
proc-macro2 = "1"
darling = "0.23"
thiserror = "2"
smallvec = { version = "1", features = ["serde"] }
bytemuck = "1"
half = "2"
parking_lot = "0.12"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bitvec = "1"
criterion = { version = "0.8", features = ["html_reports"] }
